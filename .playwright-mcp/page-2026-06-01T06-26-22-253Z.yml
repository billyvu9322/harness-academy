        - generic [ref=e42]: Response
      - generic [ref=e43]: "Feature list = danh sách checkbox rõ ràng, đo được, atomic. Nó mô tả task phải hoàn thành gì. Mỗi item cần: - **Atomic** — không split nhỏ hơn mà vẫn có nghĩa - **Verifiable** — kiểm được “xong hay chưa” - **Concrete** — không mơ hồ kiểu “improve performance”; phải kiểu “< 200ms” Ví dụ: ```markdown - [ ] API: GET /users/search?q=... - [ ] Pagination (page, pageSize params) - [ ] Filter: by role, by status - [ ] Return: id, email, name (không leak password hash) - [ ] Test: e2e với 3 dataset (empty, normal, edge case) - [ ] Performance: < 200ms với 10k user ``` Tác dụng: - **Anchor verification**: claim done → verify từng item. Item chưa check = chưa done. - **Khoá scope**: item ngoài list = ngoài scope. Muốn thêm → hỏi user trước. - **Map sang todo**: 1 feature item → 1 hoặc nhiều TodoWrite todo. Dùng khi task không trivial, thường > 30 phút: add feature, refactor module, migration, bug fix ảnh hưởng nhiều branch. Typo/rename nhỏ → skip."
