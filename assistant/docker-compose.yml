name: ${SERVICE_NAME:-harness-assistant}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5001}
      # Bundled corpus path inside the image (see Dockerfile + scripts/sync-corpus.mjs).
      DOCS_ROOT: /app/corpus
      # Postgres already runs on the VM host. Point DATABASE_URL at it via host.docker.internal
      # (resolved by extra_hosts below), e.g.
      #   postgres://user:pass@host.docker.internal:5432/harness_assistant
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      # LLM router (OpenAI-compatible).
      LLM_BASE_URL: ${LLM_BASE_URL:-https://9router.nimo.io.vn/v1}
      LLM_API_KEY: ${LLM_API_KEY:?LLM_API_KEY is required}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-cx/gpt-5.5}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      # CORS allowlist (comma-separated). The academy site origin (that embeds the widget) MUST
      # be listed, otherwise the browser blocks the widget's requests.
      WEB_ORIGINS: ${WEB_ORIGINS:?WEB_ORIGINS is required (comma-separated allowed origins)}
      API_BASE_URL: ${API_BASE_URL:-https://api-harness-academy.nimo.io.vn}
    extra_hosts:
      # Linux: lets host.docker.internal resolve to the VM host IP (where Postgres runs).
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-5001}:${PORT:-5001}"
    restart: unless-stopped
